<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katuu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #124854, #1F3A5F);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      padding: 24px;
      text-align: center;
    }
    img.logo { width: 180px; height: auto; margin-bottom: 12px; }
    img.icon { width: 72px; height: auto; margin-bottom: 24px; }
    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.7); font-size: 0.95rem; max-width: 320px; line-height: 1.5; }
    .hint { margin-top: 28px; font-size: 0.8rem; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <img class="logo" src="img/logo-katuu.png" alt="Katuu" />
  <img class="icon" src="img/icon-katuu.png" alt="" />
  <h1>O agora é presente.</h1>
  <p>O Katuu é um aplicativo para celular. Em breve na Google Play.</p>
  <p class="hint">katuu.com.br</p>
</body>
</html>
