<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instalar Katuu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .logo {
      width: 160px;
      height: auto;
      margin: 0 auto 16px;
      display: block;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      padding: 16px 32px;
      border-radius: 14px;
      text-decoration: none;
      width: 100%;
      transition: opacity 0.2s;
    }

    .btn-download:hover { opacity: 0.9; }

    .btn-download svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .warning {
      margin-top: 20px;
      background: #1a2744;
      border: 1px solid #2d3f6b;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.82rem;
      color: #94a3b8;
      line-height: 1.6;
      text-align: left;
    }

    .warning strong {
      color: #f1f5f9;
      display: block;
      margin-bottom: 4px;
    }

    .version {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #475569;
    }

    .version span {
      color: #3b82f6;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo-katuu.png" alt="Katuu" class="logo" />

    <p class="subtitle">Encontre pessoas disponíveis<br/>no mesmo local que você.</p>

    <a
      class="btn-download"
      href="/katuu-v1.0.1.apk"
      download="katuu-v1.0.1.apk"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Baixar para Android
    </a>

    <div class="warning">
      <strong>⚙️ Como instalar</strong>
      Após baixar, abra o arquivo <strong>katuu-v1.0.2.apk</strong> no seu celular.
      Se aparecer aviso de "fonte desconhecida", vá em
      <strong>Configurações → Segurança</strong> e permita a instalação.
    </div>

    <p class="version">Versão <span>1.0.2</span> — Beta</p>
  </div>
</body>
</html>
